<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OrchestriX">
  <defs>
    <linearGradient id="ox-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d333f"/><stop offset="1" stop-color="#171a1f"/>
    </linearGradient>
    <linearGradient id="ox-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.08"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ox-spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#94a23f" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#94a23f" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#94a23f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ox-core" cx="0.42" cy="0.4" r="0.72">
      <stop offset="0" stop-color="#eef2cf"/><stop offset="0.45" stop-color="#aebf5e"/><stop offset="1" stop-color="#6f7c2b"/>
    </radialGradient>
    <filter id="ox-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ox-cglow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="5.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#ox-tile)"/>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#ox-sheen)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="55.25" fill="none" stroke="#3a414d" stroke-width="1.5"/>

  <circle cx="128" cy="128" r="96" fill="url(#ox-spot)"/>
  <circle cx="128" cy="128" r="92" fill="none" stroke="#3a414d" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="2 9" stroke-linecap="round"/>

  <g filter="url(#ox-glow)" stroke-width="18" stroke-linecap="round">
    <line x1="116" y1="116" x2="81"  y2="81"  stroke="#cdaf6a"/>
    <line x1="140" y1="116" x2="175" y2="81"  stroke="#bf8b57"/>
    <line x1="116" y1="140" x2="81"  y2="175" stroke="#7ba068"/>
    <line x1="140" y1="140" x2="175" y2="175" stroke="#828b3e"/>
  </g>
  <g filter="url(#ox-glow)">
    <circle cx="81"  cy="81"  r="12" fill="#cdaf6a"/>
    <circle cx="175" cy="81"  r="12" fill="#bf8b57"/>
    <circle cx="81"  cy="175" r="12" fill="#7ba068"/>
    <circle cx="175" cy="175" r="12" fill="#828b3e"/>
  </g>
  <g fill="#fff" fill-opacity="0.42">
    <circle cx="78" cy="78" r="3.2"/><circle cx="172" cy="78" r="3.2"/>
    <circle cx="78" cy="172" r="3.2"/><circle cx="172" cy="172" r="3.2"/>
  </g>

  <circle cx="128" cy="128" r="24" fill="url(#ox-core)" filter="url(#ox-cglow)"/>
  <circle cx="128" cy="128" r="24" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="121" cy="121" r="6.5" fill="#fff" fill-opacity="0.55"/>
</svg>
